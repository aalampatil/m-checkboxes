<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 Million Checkboxes</title>
    <style>
      .checkbox {
        height: 25px;
        width: 25px;
      }
    </style>
  </head>
  <body>
    <h1>Sockets and Rate Limiting</h1>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const container = document.getElementById("container");
      const checkboxCount = 25;
      new Array(checkboxCount).fill(false).forEach((_, index) => {
        const input = document.createElement("input");
        input.type = "checkbox";
        input.classList.add(`checkbox`);
        input.classList.add(`checkbox-${index}`);
        input.addEventListener("change", (e) => {
          const checked = e.target.checked;
          console.log({ index, checked });
          (socket, emit("client:checkbox:change", { index, checked }));
        });
        container.appendChild(input);
      });
    </script>
  </body>
</html>
